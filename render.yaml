databases:
  - name: charme-joias-db
    databaseName: charme_joias
    user: charme_joias

services:
  - type: web
    name: charme-joias-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: charme-joias-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Charme Joias Acessorios
      - key: API_V1_PREFIX
        value: /api/v1
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ADMIN_EMAILS
        value: cjoiaseacessorios@gmail.com
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SEED_DEFAULT_PRODUCTS
        value: "false"
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "300"
      - key: SENTRY_DSN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_DEFAULT_FOLDER
        value: charme/produtos

  - type: web
    name: charme-joias-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SITE_URL
        sync: false
      - key: VITE_SITE_NAME
        value: Charme Joias e Acessorios
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
