databases:
  - name: charme-joias-db
    plan: free

services:
  - type: web
    name: charme-joias-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: charme-joias-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: Charme Joias Acessorios
      - key: API_V1_PREFIX
        value: /api/v1
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ADMIN_EMAILS
        value: erikagcordeiro25@gmail.com
      - key: CORS_ORIGINS
        value: https://your-vercel-domain.vercel.app
      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app
      - key: SEED_DEFAULT_PRODUCTS
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_DEFAULT_FOLDER
        value: charme/produtos

  - type: web
    name: charme-joias-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SITE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
