databases:
  - name: lua-active-db
    plan: free

services:
  - type: web
    name: lua-active-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lua-active-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ADMIN_EMAILS
        value: erikagcordeiro25@gmail.com
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_DEFAULT_PRODUCTS
        value: "true"
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: lua-active-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
