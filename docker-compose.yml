services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: charme_joias
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/charme_joias
      SECRET_KEY: local-docker-secret-key-change-before-production
      ENVIRONMENT: development
      ADMIN_EMAILS: cjoiaseacessorios@gmail.com
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      AUTO_CREATE_SCHEMA: "true"
      SEED_DEFAULT_PRODUCTS: "true"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && python scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_SITE_URL: http://localhost:5173
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
